<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2a27"/>
      <stop offset="100%" stop-color="#1a1814"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Wallet icon -->
  <g transform="translate(256,256)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wallet body -->
    <rect x="-108" y="-14" width="216" height="140" rx="14" fill="none" stroke="#10b981" stroke-width="10"/>
    <!-- Wallet flap -->
    <path d="M-108 16 L-108 -48 Q-108 -76 -80 -76 L80 -76 Q96 -76 102 -60 L110 -18"
          fill="none" stroke="#10b981" stroke-width="10"/>
    <!-- Card slot -->
    <rect x="52" y="16" width="66" height="48" rx="10" fill="none" stroke="#10b981" stroke-width="10" opacity="0.7"/>
    <!-- Clasp dot -->
    <circle cx="80" cy="40" r="8" fill="#10b981" opacity="0.5"/>
  </g>
</svg>
